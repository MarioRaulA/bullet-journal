<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Journal con Pagos</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --accent: #6f42c1;
            --accent-light: #e9d5ff;
            --border: #e5e5ea;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
            --overdue: #ffe0e0;
            --today: #fff3cd;
        }
        body.dark {
            --bg: #1c1c1e;
            --card: #2c2c2e;
            --text: #f5f5f7;
            --border: #48484a;
            --overdue: #4a1c1c;
            --today: #4a3d1c;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 1rem;
            max-width: 900px;
            margin: 0 auto;
            transition: background 0.3s, color 0.3s;
            padding-bottom: 80px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        h1 { font-size: 1.5rem; }
        button, .btn, select {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: inherit;
        }
        button:hover, .btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .btn.active { background: var(--accent); color: white; }
        nav { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .view { display: none; animation: fadeIn 0.2s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card {
            background: var(--card);
            padding: 1.2rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
        }
        textarea, input[type="text"], input[type="date"], input[type="search"], input[type="datetime-local"], input[type="time"], input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 0.5rem;
            font-family: inherit;
            resize: vertical;
        }
        .entry-row {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.6rem;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
            border-radius: 8px;
            margin-bottom: 0.2rem;
        }
        .entry-row:last-child { border-bottom: none; }
        .entry-row:hover { background: var(--bg); }
        .entry-row.overdue { background: var(--overdue); }
        .entry-row.due-today { background: var(--today); }
        .entry-row.paid { opacity: 0.6; }
        .entry-row.recurring { border-left: 3px solid var(--accent); }
        .entry-text { flex: 1; word-break: break-word; }
        .entry-text.done { text-decoration: line-through; opacity: 0.5; }
        .bullet-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; font-weight: bold;
            border: 2px solid var(--accent); color: var(--accent);
        }
        .bullet-icon.done { background: var(--success); color: white; border-color: var(--success); }
        .bullet-icon.priority { border-color: var(--danger); color: var(--danger); }
        .bullet-icon.event { border-color: #0d6efd; color: #0d6efd; }
        .bullet-icon.note { border-color: var(--text); color: var(--text); }
        .delete-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; padding: 0 0.3rem; }
        .migrate-btn { background: none; border: none; color: var(--warning); cursor: pointer; font-size: 1rem; }
        .habit-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .habit-days { display: flex; gap: 4px; }
        .habit-day {
            width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
            cursor: pointer; background: var(--card);
        }
        .habit-day.checked { background: var(--accent); color: white; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cal-day { padding: 0.5rem; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .cal-day:hover { background: var(--accent-light); }
        .cal-day.today { background: var(--accent); color: white; font-weight: bold; }
        .cal-day.has-entries { border: 2px solid var(--accent); }
        .footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; opacity: 0.7; }
        .install-btn { background: var(--accent); color: white; border: none; display: none; }
        .search-box { position: relative; margin-bottom: 1rem; }
        .search-box input { padding-left: 2.5rem; }
        .search-box span { position: absolute; left: 0.8rem; top: 0.7rem; }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: var(--bg); padding: 0.75rem 1.5rem;
            border-radius: 20px; z-index: 999; animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
        .due-info { font-size: 0.75rem; opacity: 0.8; white-space: nowrap; }
        .due-info.overdue { color: var(--danger); font-weight: bold; }
        .recurring-info { font-size: 0.7rem; opacity: 0.8; color: var(--accent); white-space: nowrap; }
        .inline-form { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
        .inline-form label { font-size: 0.85rem; }
        .inline-form select, .inline-form input[type="number"] { width: auto; }
        .modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.open { display: flex; }
        .modal-content { background: var(--card); padding: 2rem; border-radius: 16px; max-width: 500px; width: 90%; }
        .advanced-options { display: none; margin-top: 0.5rem; }
        .advanced-options.visible { display: block; }
        .payment-summary { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .payment-summary .summary-item { flex: 1; text-align: center; padding: 0.5rem; border-radius: 8px; font-size: 0.85rem; }
        .payment-summary .summary-item.paid-summary { background: #d4edda; }
        .payment-summary .summary-item.pending-summary { background: #fff3cd; }
        .payment-summary .summary-item.overdue-summary { background: #ffe0e0; }
        .dark .payment-summary .summary-item.paid-summary { background: #1a3d2a; }
        .dark .payment-summary .summary-item.pending-summary { background: #4a3d1c; }
        .dark .payment-summary .summary-item.overdue-summary { background: #4a1c1c; }
        .payment-amount { font-weight: bold; white-space: nowrap; }
        .payment-status { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 12px; white-space: nowrap; }
        .payment-status.paid-status { background: var(--success); color: white; }
        .payment-status.pending-status { background: var(--warning); color: #000; }
        .payment-status.overdue-status { background: var(--danger); color: white; }
        @media (max-width: 500px) {
            nav button { font-size: 0.8rem; padding: 0.4rem 0.7rem; }
            .entry-row { flex-wrap: wrap; }
            .inline-form { flex-direction: column; align-items: stretch; }
            .payment-summary { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <h1>📓 Bullet Journal</h1>
    <div>
        <button id="cloudUpBtn" title="Subir a la nube">☁️↑</button>
        <button id="cloudDownBtn" title="Descargar de la nube">☁️↓</button>
        <button id="exportBtn" title="Respaldo archivo">📤</button>
        <button id="importBtn" title="Restaurar archivo">📥</button>
        <button id="settingsBtn" title="Configurar nube">⚙️</button>
        <button id="themeToggle">🌓</button>
        <button id="installBtn" class="install-btn">📲 Instalar</button>
    </div>
</header>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Configurar copia en la nube</h3>
        <p><small>Usa JSONBin.io (gratis). <a href="https://jsonbin.io" target="_blank">Crear cuenta</a></small></p>
        <label>API Key:</label>
        <input type="text" id="apiKeyInput" placeholder="Pega aquí tu API Key">
        <label>Bin ID:</label>
        <input type="text" id="binIdInput" placeholder="Pega aquí el Bin ID">
        <div style="margin-top:1rem; display:flex; gap:0.5rem;">
            <button id="saveSettingsBtn" class="btn">Guardar configuración</button>
            <button id="closeSettingsBtn" class="btn">Cancelar</button>
        </div>
        <p id="cloudStatus" style="margin-top:0.5rem; font-size:0.8rem;"></p>
    </div>
</div>

<div class="search-box">
    <span>🔍</span>
    <input type="search" id="searchInput" placeholder="Buscar en todo tu journal...">
</div>
<div id="searchResults" class="card" style="display:none;"></div>

<nav>
    <button class="btn active" data-view="daily">📅 Diario</button>
    <button class="btn" data-view="monthly">📆 Calendario</button>
    <button class="btn" data-view="future">🔮 Futuro</button>
    <button class="btn" data-view="payments">💳 Pagos</button>
    <button class="btn" data-view="habits">✅ Hábitos</button>
    <button class="btn" data-view="collections">📚 Colecciones</button>
</nav>

<div id="dailyView" class="view active">
    <div class="card">
        <div style="display:flex; gap:0.5rem; align-items:center;">
            <input type="date" id="selectedDate" style="flex:1;">
            <button id="prevDay">◀</button>
            <button id="todayBtn">Hoy</button>
            <button id="nextDay">▶</button>
        </div>
        <textarea id="newEntry" placeholder="Escribe aquí tu tarea, evento, nota..." rows="2"></textarea>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.5rem;">
            <button class="btn type-btn" data-type="task">• Tarea</button>
            <button class="btn type-btn" data-type="priority">★ Prioridad</button>
            <button class="btn type-btn" data-type="event">○ Evento</button>
            <button class="btn type-btn" data-type="note">— Nota</button>
        </div>
        <div class="inline-form">
            <label>📅 Vence:</label>
            <input type="datetime-local" id="dueDateTime" style="width: auto; flex: 1;">
            <label>⏰ Alarma:</label>
            <input type="checkbox" id="setAlarm" checked>
        </div>
        <button id="addEntryBtn" style="width:100%; margin-top:0.5rem;">➕ Agregar entrada</button>
    </div>
    <div id="dailyEntries" class="card"></div>
</div>

<div id="monthlyView" class="view">
    <div class="card">
        <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:1rem;">
            <button id="prevMonth">◀</button>
            <span id="monthLabel" style="flex:1; text-align:center; font-weight:bold;"></span>
            <button id="nextMonth">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
    <div id="monthlyTasks" class="card"></div>
</div>

<div id="futureView" class="view">
    <div class="card">
        <input type="text" id="futureText" placeholder="Ej: En marzo: renovar pasaporte">
        <input type="month" id="futureMonth">
        <button id="addFutureBtn">➕ Agregar al registro futuro</button>
    </div>
    <div id="futureEntries" class="card"></div>
</div>

<div id="paymentsView" class="view">
    <div class="card">
        <h3>💳 Agregar pago</h3>
        <input type="text" id="paymentName" placeholder="Nombre del pago (ej: Alquiler, Luz, Internet)">
        <div style="display:flex; gap:0.5rem;">
            <input type="number" id="paymentAmount" placeholder="Monto" step="0.01" style="flex:1;">
            <input type="date" id="paymentDueDate" style="flex:1;">
        </div>
        <div class="inline-form">
            <label>🔄 Repetir:</label>
            <select id="paymentRepeat">
                <option value="none">Pago único</option>
                <option value="monthly">Mensual</option>
                <option value="yearly">Anual</option>
            </select>
            <label>⏰ Alarma:</label>
            <input type="checkbox" id="paymentAlarm" checked>
        </div>
        <button id="addPaymentBtn" style="width:100%;">➕ Agregar pago</button>
    </div>
    <div class="card">
        <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:1rem;">
            <button id="prevPaymentMonth">◀</button>
            <span id="paymentMonthLabel" style="flex:1; text-align:center; font-weight:bold;"></span>
            <button id="nextPaymentMonth">▶</button>
        </div>
        <div class="payment-summary" id="paymentSummary"></div>
        <div id="paymentsList"></div>
    </div>
</div>

<div id="habitsView" class="view">
    <div class="card">
        <input type="text" id="newHabit" placeholder="Nuevo hábito (ej: Leer 30 min)">
        <button id="addHabitBtn">➕ Agregar hábito</button>
    </div>
    <div id="habitsList" class="card"></div>
</div>

<div id="collectionsView" class="view">
    <div class="card">
        <input type="text" id="newCollectionName" placeholder="Nombre de la colección (ej: Libros leídos)">
        <button id="addCollectionBtn">➕ Crear colección</button>
    </div>
    <div id="collectionsList"></div>
</div>

<div class="footer">Tus datos se guardan localmente y pueden respaldarse en la nube</div>

<script>
const STORAGE = 'bujo_alarmas';
let data = { daily: {}, habits: [], collections: [], future: [], payments: [], alarmQueue: [] };
let alarmTimers = {};

function load() {
    const raw = localStorage.getItem(STORAGE);
    if (raw) data = JSON.parse(raw);
    if (!data.payments) data.payments = [];
    migratePendingTasks();
    generateRecurringPayments();
}
function save() {
    localStorage.setItem(STORAGE, JSON.stringify(data));
    setupAllAlarms();
}

function migratePendingTasks() {
    const today = new Date().toISOString().split('T')[0];
    for (const date in data.daily) {
        if (date < today) {
            const tasks = data.daily[date].filter(e => (e.type === 'task' || e.type === 'priority') && !e.done && !e.migrated);
            tasks.forEach(t => {
                t.migrated = true;
                t.migratedTo = today;
                if (!data.daily[today]) data.daily[today] = [];
                data.daily[today].push({ ...t, id: Date.now(), done: false, migrated: false });
            });
        }
    }
    save();
}

function generateRecurringPayments() {
    const today = new Date().toISOString().split('T')[0];
    data.payments.forEach(payment => {
        if (payment.recurring && payment.recurring !== 'none' && payment.lastGenerated) {
            const lastDate = payment.lastGenerated;
            let nextDate = lastDate;
            if (payment.recurring === 'monthly') {
                const d = new Date(lastDate + 'T00:00:00');
                d.setMonth(d.getMonth() + 1);
                nextDate = d.toISOString().split('T')[0];
            } else if (payment.recurring === 'yearly') {
                const d = new Date(lastDate + 'T00:00:00');
                d.setFullYear(d.getFullYear() + 1);
                nextDate = d.toISOString().split('T')[0];
            }
            if (nextDate <= today && !data.payments.some(p => p.name === payment.name && p.dueDate === nextDate && p.parentId === payment.id)) {
                data.payments.push({
                    ...payment,
                    id: Date.now(),
                    dueDate: nextDate,
                    paid: false,
                    alarmFired: false,
                    lastGenerated: nextDate,
                    parentId: payment.id
                });
                payment.lastGenerated = nextDate;
                save();
            }
        }
    });
}

load();
requestNotificationPermission();

function getCloudConfig() {
    return {
        apiKey: localStorage.getItem('cloud_apiKey') || '',
        binId: localStorage.getItem('cloud_binId') || ''
    };
}
function saveCloudConfig(apiKey, binId) {
    localStorage.setItem('cloud_apiKey', apiKey);
    localStorage.setItem('cloud_binId', binId);
}

async function uploadToCloud() {
    const { apiKey, binId } = getCloudConfig();
    if (!apiKey || !binId) { alert('Configura primero tu nube (⚙️).'); return; }
    try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
            method: 'PUT',
            headers: { 'X-Master-Key': apiKey, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (r.ok) {
            localStorage.setItem('cloud_lastSync', new Date().toISOString());
            document.getElementById('cloudStatus').textContent = '✅ Última copia: ' + new Date().toLocaleString();
            toast('Datos subidos a la nube ☁️');
        } else throw new Error();
    } catch (e) { alert('No se pudo subir a la nube.'); }
}

async function downloadFromCloud() {
    const { apiKey, binId } = getCloudConfig();
    if (!apiKey || !binId) { alert('Configura primero tu nube (⚙️).'); return; }
    if (!confirm('¿Reemplazar datos locales con la copia de la nube?')) return;
    try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, { headers: { 'X-Master-Key': apiKey } });
        if (r.ok) {
            data = (await r.json()).record;
            save();
            localStorage.setItem('cloud_lastSync', new Date().toISOString());
            toast('Datos descargados ☁️');
            location.reload();
        } else throw new Error();
    } catch (e) { alert('No se pudo descargar de la nube.'); }
}

document.getElementById('settingsBtn').addEventListener('click', () => {
    const cfg = getCloudConfig();
    document.getElementById('apiKeyInput').value = cfg.apiKey;
    document.getElementById('binIdInput').value = cfg.binId;
    document.getElementById('cloudStatus').textContent = localStorage.getItem('cloud_lastSync') ? 'Última sincronización: ' + new Date(localStorage.getItem('cloud_lastSync')).toLocaleString() : '';
    document.getElementById('settingsModal').classList.add('open');
});
document.getElementById('closeSettingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('open'));
document.getElementById('saveSettingsBtn').addEventListener('click', () => {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    const binId = document.getElementById('binIdInput').value.trim();
    if (!apiKey || !binId) { alert('Ambos campos son necesarios.'); return; }
    saveCloudConfig(apiKey, binId);
    document.getElementById('settingsModal').classList.remove('open');
    toast('Configuración guardada ⚙️');
});
document.getElementById('cloudUpBtn').addEventListener('click', uploadToCloud);
document.getElementById('cloudDownBtn').addEventListener('click', downloadFromCloud);

async function requestNotificationPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
        await Notification.requestPermission();
    }
}

function setupAllAlarms() {
    Object.values(alarmTimers).forEach(t => clearTimeout(t));
    alarmTimers = {};
    if (!('Notification' in window)) return;
    const now = new Date().getTime();
    for (const date in data.daily) {
        data.daily[date].forEach(entry => {
            if (entry.dueDateTime && entry.alarm && !entry.done && !entry.alarmFired) {
                const due = new Date(entry.dueDateTime).getTime();
                const delay = due - now;
                if (delay > 0) alarmTimers[entry.id] = setTimeout(() => triggerAlarm(entry, date), delay);
                else if (delay <= 0 && !entry.alarmFired) triggerAlarm(entry, date);
            }
        });
    }
    data.payments.forEach(payment => {
        if (payment.alarm && !payment.paid && !payment.alarmFired && payment.dueDate) {
            const due = new Date(payment.dueDate + 'T09:00:00').getTime();
            const delay = due - now;
            if (delay > 0) alarmTimers['p_' + payment.id] = setTimeout(() => triggerPaymentAlarm(payment), delay);
            else if (delay <= 0 && !payment.alarmFired) triggerPaymentAlarm(payment);
        }
    });
}

function triggerAlarm(entry, date) {
    if (entry.alarmFired) return;
    entry.alarmFired = true;
    save();
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('⏰ Recordatorio', { body: entry.text, tag: 'bujo', requireInteraction: true });
    }
    playAlarmSound();
    toast('🔔 ¡Alarma! ' + entry.text.substring(0, 50));
}

function triggerPaymentAlarm(payment) {
    if (payment.alarmFired) return;
    payment.alarmFired = true;
    save();
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('💳 Pago pendiente', { body: payment.name + ' - $' + payment.amount, tag: 'bujo-pay', requireInteraction: true });
    }
    playAlarmSound();
    toast('💳 ¡Pago pendiente! ' + payment.name);
}

function playAlarmSound() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523.25, 659.25, 783.99].forEach((f, i) => {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.type = 'sine'; o.frequency.value = f;
            g.gain.value = 0.3; g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
            o.connect(g); g.connect(ctx.destination);
            o.start(ctx.currentTime + i * 0.2); o.stop(ctx.currentTime + i * 0.2 + 0.8);
        });
    } catch (e) {}
}

document.getElementById('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('bujo_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
});
if (localStorage.getItem('bujo_theme') === 'dark') document.body.classList.add('dark');

document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(btn.dataset.view + 'View').classList.add('active');
        if (btn.dataset.view === 'daily') renderDaily();
        if (btn.dataset.view === 'monthly') { renderCalendar(); renderMonthlyTasks(); }
        if (btn.dataset.view === 'future') renderFuture();
        if (btn.dataset.view === 'payments') renderPayments();
        if (btn.dataset.view === 'habits') renderHabits();
        if (btn.dataset.view === 'collections') renderCollections();
    });
});

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { searchResults.style.display = 'none'; return; }
    let results = [];
    for (const date in data.daily) {
        data.daily[date].forEach(e => { if (e.text.toLowerCase().includes(q)) results.push({ ...e, date }); });
    }
    data.payments.forEach(p => { if (p.name.toLowerCase().includes(q)) results.push({ ...p, from: 'payment' }); });
    if (!results.length) searchResults.innerHTML = '<p style="opacity:0.7;">Sin resultados</p>';
    else searchResults.innerHTML = results.map(r => `<div class="entry-row"><span>${r.from === 'payment' ? '💳' : '📅'}</span><span class="entry-text">${r.text || r.name}</span><small>${r.date || r.dueDate}</small></div>`).join('');
    searchResults.style.display = 'block';
});

document.getElementById('addEntryBtn').addEventListener('click', () => {

    if (!text) return;
    const date = selectedDate.value;
    const due = document.getElementById('dueDateTime').value;
    const alarm = document.getElementById('setAlarm').checked;
    if (!data.daily[date]) data.daily[date] = [];

selectedDate.addEventListener('change', renderDaily);
document.getElementById('prevDay').addEventListener('click', () => changeDay(-1));
document.getElementById('nextDay').addEventListener('click', () => changeDay(1));
document.getElementById('todayBtn').addEventListener('click', () => { selectedDate.value = new Date().toISOString().split('T')[0]; renderDaily(); });
function changeDay(o) { const d = new Date(selectedDate.value + 'T00:00:00'); d.setDate(d.getDate() + o); selectedDate.value = d.toISOString().split('T')[0]; renderDaily(); }

function isOverdue(dt, done) { return dt && !done && new Date(dt).getTime() < new Date().getTime(); }
function isToday(dt) { return dt && new Date(dt).toDateString() === new Date().toDateString(); }
function formatDueDate(dt) {
    if (!dt) return '';
    const d = new Date(dt), diff = d.getTime() - new Date().getTime();
    if (diff < 0) return '⚠️ Vencido';
    if (Math.ceil(diff / 86400000) === 0) return '📅 Hoy ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    return '📅 ' + d.toLocaleDateString();
}

function renderDaily() {
    const date = selectedDate.value;
    const entries = (data.daily[date] || []).sort((a, b) => a.done - b.done);
    const container = document.getElementById('dailyEntries');
    if (!entries.length) { container.innerHTML = '<p style="opacity:0.7;text-align:center;">Día sin entradas</p>'; return; }
    container.innerHTML = entries.map(e => {
        let cls = '';
        if (!e.done && e.dueDateTime && isOverdue(e.dueDateTime, e.done)) cls = 'overdue';
        else if (!e.done && e.dueDateTime && isToday(e.dueDateTime)) cls = 'due-today';
        return `<div class="entry-row ${cls}">
            <div class="bullet-icon ${e.type} ${e.done ? 'done' : ''}" data-id="${e.id}" data-date="${date}">${e.done ? '✓' : '•'}</div>
            <span class="entry-text ${e.done ? 'done' : ''}">${e.text}</span>
            ${e.dueDateTime ? `<span class="due-info ${isOverdue(e.dueDateTime, e.done) ? 'overdue' : ''}">${formatDueDate(e.dueDateTime)}</span>` : ''}
            <button class="delete-btn" data-id="${e.id}" data-date="${date}">🗑️</button>
        </div>`;
    }).join('');
    container.querySelectorAll('.bullet-icon').forEach(b => {
        b.addEventListener('click', () => {
            const id = Number(b.dataset.id), d = b.dataset.date;
            const ent = data.daily[d].find(e => e.id === id);
            if (ent) { ent.done = !ent.done; save(); renderDaily(); }
        });
    });
    container.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const id = Number(btn.dataset.id), d = btn.dataset.date;
            data.daily[d] = data.daily[d].filter(e => e.id !== id);
            save(); renderDaily();
        });
    });
}

let calMonth = new Date().getMonth(), calYear = new Date().getFullYear();
function renderCalendar() {
    document.getElementById('monthLabel').textContent = new Date(calYear, calMonth).toLocaleDateString('es', { month: 'long', year: 'numeric' });
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    const fd = new Date(calYear, calMonth, 1).getDay(), dim = new Date(calYear, calMonth + 1, 0).getDate();
    const today = new Date().toISOString().split('T')[0];
    'Do,Lu,Ma,Mi,Ju,Vi,Sá'.split(',').forEach(d => grid.innerHTML += `<div style="font-weight:bold;">${d}</div>`);
    for (let i = 0; i < fd; i++) grid.innerHTML += '<div></div>';
    for (let d = 1; d <= dim; d++) {
        const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        grid.innerHTML += `<div class="cal-day${ds === today ? ' today' : ''}${data.daily[ds]?.length ? ' has-entries' : ''}" data-date="${ds}">${d}</div>`;
    }
    document.querySelectorAll('.cal-day').forEach(day => {
        day.addEventListener('click', () => { selectedDate.value = day.dataset.date; document.querySelector('nav button[data-view="daily"]').click(); });
    });
}
function renderMonthlyTasks() {
    const container = document.getElementById('monthlyTasks');
    let tasks = [];
    const dim = new Date(calYear, calMonth + 1, 0).getDate();
    for (let d = 1; d <= dim; d++) {
        const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if (data.daily[ds]) data.daily[ds].forEach(e => tasks.push({ ...e, date: ds }));
    }
    container.innerHTML = tasks.length ? tasks.map(t => `<div class="entry-row"><span>${t.done ? '✓' : '•'}</span><span class="entry-text ${t.done ? 'done' : ''}">${t.text}</span><small>${t.date}</small></div>`).join('') : '<p style="opacity:0.7;">Sin tareas</p>';
}
document.getElementById('prevMonth').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); renderMonthlyTasks(); });
document.getElementById('nextMonth').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); renderMonthlyTasks(); });

document.getElementById('addFutureBtn').addEventListener('click', () => {
    const text = document.getElementById('futureText').value.trim(), month = document.getElementById('futureMonth').value;
    if (!text || !month) return;
    data.future.push({ id: Date.now(), text, month, done: false });
    save(); document.getElementById('futureText').value = ''; renderFuture();
});
function renderFuture() {
    const c = document.getElementById('futureEntries');
    c.innerHTML = data.future.length ? data.future.map(f => `<div class="entry-row"><span>🔮</span><span class="entry-text">${f.text}</span><small>${f.month}</small><button class="delete-btn" data-id="${f.id}">🗑️</button></div>`).join('') : '<p style="opacity:0.7;">Sin entradas</p>';
    c.querySelectorAll('.delete-btn').forEach(b => { b.addEventListener('click', () => { data.future = data.future.filter(f => f.id !== Number(b.dataset.id)); save(); renderFuture(); }); });
}

let payMonth = new Date().getMonth(), payYear = new Date().getFullYear();
document.getElementById('addPaymentBtn').addEventListener('click', () => {
    const name = document.getElementById('paymentName').value.trim();
    const amount = parseFloat(document.getElementById('paymentAmount').value) || 0;
    const dueDate = document.getElementById('paymentDueDate').value;
    const recurring = document.getElementById('paymentRepeat').value;
    const alarm = document.getElementById('paymentAlarm').checked;
    if (!name || !dueDate) return;
    data.payments.push({ id: Date.now(), name, amount, dueDate, paid: false, recurring, alarm, alarmFired: false, lastGenerated: dueDate, parentId: null });
    save();
    document.getElementById('paymentName').value = '';
    document.getElementById('paymentAmount').value = '';
    document.getElementById('paymentDueDate').value = '';
    document.getElementById('paymentAlarm').checked = true;
    renderPayments();
    toast('Pago agregado 💳');
});
function renderPayments() {
    document.getElementById('paymentMonthLabel').textContent = new Date(payYear, payMonth).toLocaleDateString('es', { month: 'long', year: 'numeric' });
    const monthStart = `${payYear}-${String(payMonth+1).padStart(2,'0')}-01`;
    const monthEnd = `${payYear}-${String(payMonth+1).padStart(2,'0')}-${new Date(payYear, payMonth+1, 0).getDate()}`;
    const payments = data.payments.filter(p => p.dueDate >= monthStart && p.dueDate <= monthEnd);
    let totalPaid = 0, totalPending = 0, totalOverdue = 0;
    const today = new Date().toISOString().split('T')[0];
    payments.forEach(p => {
        if (p.paid) totalPaid += p.amount;
        else if (p.dueDate < today) totalOverdue += p.amount;
        else totalPending += p.amount;
    });
    document.getElementById('paymentSummary').innerHTML = `
        <div class="summary-item paid-summary">✅ Pagado<br>$${totalPaid.toFixed(2)}</div>
        <div class="summary-item pending-summary">⏳ Pendiente<br>$${totalPending.toFixed(2)}</div>
        <div class="summary-item overdue-summary">⚠️ Vencido<br>$${totalOverdue.toFixed(2)}</div>
    `;
    const container = document.getElementById('paymentsList');
    if (!payments.length) { container.innerHTML = '<p style="opacity:0.7;text-align:center;">Sin pagos este mes</p>'; return; }
    container.innerHTML = payments.sort((a, b) => a.paid - b.paid || a.dueDate.localeCompare(b.dueDate)).map(p => {
        let cls = p.paid ? 'paid' : p.dueDate < today ? 'overdue' : p.dueDate === today ? 'due-today' : '';
        let status = p.paid ? 'Pagado' : p.dueDate < today ? 'Vencido' : 'Pendiente';
        let statusCls = p.paid ? 'paid-status' : p.dueDate < today ? 'overdue-status' : 'pending-status';
        return `<div class="entry-row ${cls}">
            <div class="bullet-icon ${p.paid ? 'done' : ''}" data-id="${p.id}">${p.paid ? '✓' : '💳'}</div>
            <span class="entry-text ${p.paid ? 'done' : ''}">${p.name}</span>
            <span class="payment-amount">$${p.amount.toFixed(2)}</span>
            <span class="payment-status ${statusCls}">${status}</span>
            <small>${p.dueDate}</small>
            <button class="delete-btn" data-id="${p.id}">🗑️</button>
        </div>`;
    }).join('');
    container.querySelectorAll('.bullet-icon').forEach(b => {
        b.addEventListener('click', () => {
            const p = data.payments.find(x => x.id === Number(b.dataset.id));
            if (p) { p.paid = !p.paid; save(); renderPayments(); }
        });
    });
    container.querySelectorAll('.delete-btn').forEach(b => {
        b.addEventListener('click', () => {
            data.payments = data.payments.filter(p => p.id !== Number(b.dataset.id));
            save(); renderPayments();
        });
    });
}
document.getElementById('prevPaymentMonth').addEventListener('click', () => { payMonth--; if (payMonth < 0) { payMonth = 11; payYear--; } renderPayments(); });
document.getElementById('nextPaymentMonth').addEventListener('click', () => { payMonth++; if (payMonth > 11) { payMonth = 0; payYear++; } renderPayments(); });

document.getElementById('addHabitBtn').addEventListener('click', () => {
    const name = document.getElementById('newHabit').value.trim();
    if (!name) return;
    data.habits.push({ id: Date.now(), name, tracker: {} });
    save(); document.getElementById('newHabit').value = ''; renderHabits();
});
function renderHabits() {
    const c = document.getElementById('habitsList');
    if (!data.habits.length) { c.innerHTML = '<p style="opacity:0.7;">Sin hábitos</p>'; return; }
    const last7 = []; for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); last7.push(d.toISOString().split('T')[0]); }
    c.innerHTML = data.habits.map(h => `<div class="habit-row"><span style="flex:1;">${h.name}</span><div class="habit-days">${last7.map(date => `<div class="habit-day ${h.tracker[date] ? 'checked' : ''}" data-habit="${h.id}" data-date="${date}">${h.tracker[date] ? '✓' : ''}</div>`).join('')}</div><button class="delete-btn" data-habit="${h.id}">🗑️</button></div>`).join('');
    c.querySelectorAll('.habit-day').forEach(day => { day.addEventListener('click', () => { const h = data.habits.find(x => x.id === Number(day.dataset.habit)); if (h) { h.tracker[day.dataset.date] = !h.tracker[day.dataset.date]; save(); renderHabits(); } }); });
    c.querySelectorAll('.delete-btn').forEach(b => { b.addEventListener('click', () => { data.habits = data.habits.filter(h => h.id !== Number(b.dataset.habit)); save(); renderHabits(); }); });
}

document.getElementById('addCollectionBtn').addEventListener('click', () => {
    const name = document.getElementById('newCollectionName').value.trim();
    if (!name) return;
    data.collections.push({ id: Date.now(), name, items: [] });
    save(); document.getElementById('newCollectionName').value = ''; renderCollections();
});
function renderCollections() {
    const c = document.getElementById('collectionsList');
    if (!data.collections.length) { c.innerHTML = '<div class="card"><p style="opacity:0.7;">Sin colecciones</p></div>'; return; }
    c.innerHTML = data.collections.map(col => `<div class="card"><h3>${col.name} <button class="delete-btn" data-id="${col.id}">🗑️</button></h3><div style="display:flex;gap:0.5rem;"><input type="text" class="ci" data-id="${col.id}" placeholder="Nuevo elemento" style="flex:1;"><button class="aci" data-id="${col.id}">➕</button></div><ul style="margin-top:0.5rem;">${col.items.map(i => `<li>${i}</li>`).join('')}</ul></div>`).join('');
    c.querySelectorAll('.aci').forEach(b => { b.addEventListener('click', () => { const col = data.collections.find(x => x.id === Number(b.dataset.id)); const input = document.querySelector(`.ci[data-id="${b.dataset.id}"]`); if (col && input.value.trim()) { col.items.push(input.value.trim()); save(); renderCollections(); } }); });
    c.querySelectorAll('.delete-btn').forEach(b => { b.addEventListener('click', () => { data.collections = data.collections.filter(x => x.id !== Number(b.dataset.id)); save(); renderCollections(); }); });
}

function toast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}
