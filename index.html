<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Journal con Alarmas</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --accent: #6f42c1;
            --accent-light: #e9d5ff;
            --border: #e5e5ea;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
            --overdue: #ffe0e0;
            --today: #fff3cd;
        }
        body.dark {
            --bg: #1c1c1e;
            --card: #2c2c2e;
            --text: #f5f5f7;
            --border: #48484a;
            --overdue: #4a1c1c;
            --today: #4a3d1c;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 1rem;
            max-width: 900px;
            margin: 0 auto;
            transition: background 0.3s, color 0.3s;
            padding-bottom: 80px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        h1 { font-size: 1.5rem; }
        button, .btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        button:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .btn.active { background: var(--accent); color: white; }
        nav { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .view { display: none; animation: fadeIn 0.2s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card {
            background: var(--card);
            padding: 1.2rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
        }
        textarea, input[type="text"], input[type="date"], input[type="search"], input[type="datetime-local"], input[type="time"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 0.5rem;
            font-family: inherit;
            resize: vertical;
        }
        .entry-row {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.6rem;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
            border-radius: 8px;
            margin-bottom: 0.2rem;
        }
        .entry-row:last-child { border-bottom: none; }
        .entry-row:hover { background: var(--bg); }
        .entry-row.overdue { background: var(--overdue); }
        .entry-row.due-today { background: var(--today); }
        .entry-text { flex: 1; word-break: break-word; }
        .entry-text.done { text-decoration: line-through; opacity: 0.5; }
        .bullet-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; font-weight: bold;
            border: 2px solid var(--accent); color: var(--accent);
        }
        .bullet-icon.done { background: var(--success); color: white; border-color: var(--success); }
        .bullet-icon.priority { border-color: var(--danger); color: var(--danger); }
        .bullet-icon.event { border-color: #0d6efd; color: #0d6efd; }
        .bullet-icon.note { border-color: var(--text); color: var(--text); }
        .delete-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; padding: 0 0.3rem; }
        .migrate-btn { background: none; border: none; color: var(--warning); cursor: pointer; font-size: 1rem; }
        .habit-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .habit-days { display: flex; gap: 4px; }
        .habit-day {
            width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
            cursor: pointer; background: var(--card);
        }
        .habit-day.checked { background: var(--accent); color: white; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
        .cal-day { padding: 0.5rem; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .cal-day:hover { background: var(--accent-light); }
        .cal-day.today { background: var(--accent); color: white; font-weight: bold; }
        .cal-day.has-entries { border: 2px solid var(--accent); }
        .footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; opacity: 0.7; }
        .install-btn { background: var(--accent); color: white; border: none; display: none; }
        .search-box { position: relative; margin-bottom: 1rem; }
        .search-box input { padding-left: 2.5rem; }
        .search-box span { position: absolute; left: 0.8rem; top: 0.7rem; }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: var(--bg); padding: 0.75rem 1.5rem;
            border-radius: 20px; z-index: 999; animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
        .due-info { font-size: 0.75rem; opacity: 0.8; white-space: nowrap; }
        .due-info.overdue { color: var(--danger); font-weight: bold; }
        .inline-form { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
        .inline-form label { font-size: 0.85rem; }
        @media (max-width: 500px) {
            nav button { font-size: 0.8rem; padding: 0.4rem 0.7rem; }
            .entry-row { flex-wrap: wrap; }
            .inline-form { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<header>
    <h1>📓 Bullet Journal</h1>
    <div>
        <button id="exportBtn" title="Respaldo">📤</button>
        <button id="importBtn" title="Restaurar">📥</button>
        <button id="themeToggle">🌓</button>
        <button id="installBtn" class="install-btn">📲 Instalar</button>
    </div>
</header>

<div class="search-box">
    <span>🔍</span>
    <input type="search" id="searchInput" placeholder="Buscar en todo tu journal...">
</div>
<div id="searchResults" class="card" style="display:none;"></div>

<nav>
    <button class="btn active" data-view="daily">📅 Diario</button>
    <button class="btn" data-view="monthly">📆 Calendario</button>
    <button class="btn" data-view="future">🔮 Futuro</button>
    <button class="btn" data-view="habits">✅ Hábitos</button>
    <button class="btn" data-view="collections">📚 Colecciones</button>
</nav>

<!-- DIARIO -->
<div id="dailyView" class="view active">
    <div class="card">
        <div style="display:flex; gap:0.5rem; align-items:center;">
            <input type="date" id="selectedDate" style="flex:1;">
            <button id="prevDay">◀</button>
            <button id="todayBtn">Hoy</button>
            <button id="nextDay">▶</button>
        </div>
        <textarea id="newEntry" placeholder="Escribe aquí tu tarea, evento, nota..." rows="2"></textarea>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.5rem;">
            <button class="btn type-btn" data-type="task">• Tarea</button>
            <button class="btn type-btn" data-type="priority">★ Prioridad</button>
            <button class="btn type-btn" data-type="event">○ Evento</button>
            <button class="btn type-btn" data-type="note">— Nota</button>
        </div>
        <!-- Fecha de vencimiento y alarma -->
        <div class="inline-form">
            <label>📅 Vence:</label>
            <input type="datetime-local" id="dueDateTime" style="width: auto; flex: 1;">
            <label>⏰ Alarma:</label>
            <input type="checkbox" id="setAlarm" checked>
        </div>
        <button id="addEntryBtn" style="width:100%; margin-top:0.5rem;">➕ Agregar entrada</button>
    </div>
    <div id="dailyEntries" class="card"></div>
</div>

<!-- MENSUAL -->
<div id="monthlyView" class="view">
    <div class="card">
        <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:1rem;">
            <button id="prevMonth">◀</button>
            <span id="monthLabel" style="flex:1; text-align:center; font-weight:bold;"></span>
            <button id="nextMonth">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
    <div id="monthlyTasks" class="card"></div>
</div>

<!-- FUTURO -->
<div id="futureView" class="view">
    <div class="card">
        <input type="text" id="futureText" placeholder="Ej: En marzo: renovar pasaporte">
        <input type="month" id="futureMonth">
        <button id="addFutureBtn">➕ Agregar al registro futuro</button>
    </div>
    <div id="futureEntries" class="card"></div>
</div>

<!-- HÁBITOS -->
<div id="habitsView" class="view">
    <div class="card">
        <input type="text" id="newHabit" placeholder="Nuevo hábito (ej: Leer 30 min)">
        <button id="addHabitBtn">➕ Agregar hábito</button>
    </div>
    <div id="habitsList" class="card"></div>
</div>

<!-- COLECCIONES -->
<div id="collectionsView" class="view">
    <div class="card">
        <input type="text" id="newCollectionName" placeholder="Nombre de la colección (ej: Libros leídos)">
        <button id="addCollectionBtn">➕ Crear colección</button>
    </div>
    <div id="collectionsList"></div>
</div>

<div class="footer">Tus datos se guardan localmente en este dispositivo</div>

<script>
    // ========== DATOS ==========
    const STORAGE = 'bujo_alarmas';
    let data = {
        daily: {},
        habits: [],
        collections: [],
        future: [],
        alarmQueue: []  // IDs de tareas con alarma pendiente
    };
    let alarmTimers = {};  // Para cancelar alarmas

    function load() {
        const raw = localStorage.getItem(STORAGE);
        if (raw) data = JSON.parse(raw);
        migratePendingTasks();
    }
    function save() {
        localStorage.setItem(STORAGE, JSON.stringify(data));
        // Reconfigurar alarmas al guardar
        setupAllAlarms();
    }

    function migratePendingTasks() {
        const today = new Date().toISOString().split('T')[0];
        let migrated = false;
        for (const date in data.daily) {
            if (date < today) {
                const tasks = data.daily[date].filter(e => (e.type === 'task' || e.type === 'priority') && !e.done && !e.migrated);
                if (tasks.length > 0) {
                    if (!data.daily[today]) data.daily[today] = [];
                    tasks.forEach(t => {
                        t.migrated = true;
                        t.migratedTo = today;
                        const newTask = { ...t, id: Date.now() + Math.random(), done: false, migrated: false };
                        delete newTask.migratedTo;
                        data.daily[today].push(newTask);
                    });
                    migrated = true;
                }
            }
        }
        if (migrated) save();
    }

    load();
    requestNotificationPermission();

    // ========== NOTIFICACIONES Y ALARMAS ==========
    async function requestNotificationPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                toast('🔔 Notificaciones activadas');
            }
        }
    }

    function setupAllAlarms() {
        // Limpiar alarmas anteriores
        Object.values(alarmTimers).forEach(t => clearTimeout(t));
        alarmTimers = {};
        if (!('Notification' in window)) return;

        const now = new Date().getTime();
        for (const date in data.daily) {
            data.daily[date].forEach(entry => {
                if (entry.dueDateTime && entry.alarm && !entry.done && !entry.alarmFired) {
                    const dueTime = new Date(entry.dueDateTime).getTime();
                    const delay = dueTime - now;
                    if (delay > 0) {
                        alarmTimers[entry.id] = setTimeout(() => {
                            triggerAlarm(entry, date);
                        }, delay);
                    } else if (delay <= 0 && !entry.alarmFired) {
                        // Ya pasó, disparar inmediatamente
                        triggerAlarm(entry, date);
                    }
                }
            });
        }
    }

    function triggerAlarm(entry, date) {
        if (entry.alarmFired) return;
        entry.alarmFired = true;
        save();
        
        // Notificación del sistema
        if ('Notification' in window && Notification.permission === 'granted') {
            const notification = new Notification('⏰ Recordatorio Bullet Journal', {
                body: entry.text,
                icon: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#6f42c1"/><text x="96" y="120" font-size="96" text-anchor="middle" fill="white">⏰</text></svg>'),
                tag: 'bujo-alarm',
                requireInteraction: true,
                vibrate: [200, 100, 200]
            });
            notification.onclick = () => {
                window.focus();
                selectedDate.value = date;
                document.querySelector('nav button[data-view="daily"]').click();
            };
        }
        
        // Sonido de alarma (generado sintéticamente)
        playAlarmSound();
        
        // Toast visual
        toast('🔔 ¡Alarma! ' + entry.text.substring(0, 50));
        
        // Actualizar vista si está visible
        if (document.getElementById('dailyView').classList.contains('active')) {
            renderDaily();
        }
    }

    function playAlarmSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523.25, 659.25, 783.99]; // Do, Mi, Sol
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.value = 0.3;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i * 0.2);
                osc.stop(audioCtx.currentTime + i * 0.2 + 0.8);
            });
        } catch (e) {
            // Silenciosamente fallar si no hay AudioContext
        }
    }

    // ========== TEMA ==========
    document.getElementById('themeToggle').addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('bujo_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    });
    if (localStorage.getItem('bujo_theme') === 'dark') document.body.classList.add('dark');

    // ========== NAVEGACIÓN ==========
    document.querySelectorAll('nav button').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(btn.dataset.view + 'View').classList.add('active');
            renderView(btn.dataset.view);
        });
    });
    function renderView(view) {
        switch(view) {
            case 'daily': renderDaily(); break;
            case 'monthly': renderCalendar(); renderMonthlyTasks(); break;
            case 'future': renderFuture(); break;
            case 'habits': renderHabits(); break;
            case 'collections': renderCollections(); break;
        }
    }

    // ========== BÚSQUEDA ==========
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    searchInput.addEventListener('input', () => {
        const q = searchInput.value.trim().toLowerCase();
        if (!q) { searchResults.style.display = 'none'; return; }
        let results = [];
        for (const date in data.daily) {
            data.daily[date].forEach(e => {
                if (e.text.toLowerCase().includes(q)) results.push({ ...e, date });
            });
        }
        data.future.forEach(e => {
            if (e.text.toLowerCase().includes(q)) results.push({ ...e, from: 'future' });
        });
        if (results.length === 0) {
            searchResults.innerHTML = '<p style="opacity:0.7;">Sin resultados</p>';
        } else {
            searchResults.innerHTML = results.map(r => `
                <div class="entry-row">
                    <span>${r.from === 'future' ? '🔮' : '📅'}</span>
                    <span class="entry-text ${r.done ? 'done' : ''}">${r.text}</span>
                    <small>${r.from === 'future' ? r.month : r.date}</small>
                    ${r.dueDateTime ? `<span class="due-info ${isOverdue(r.dueDateTime, r.done) ? 'overdue' : ''}">${formatDueDate(r.dueDateTime)}</span>` : ''}
                </div>
            `).join('');
        }
        searchResults.style.display = 'block';
    });

    // ========== EXPORTAR / IMPORTAR ==========
    document.getElementById('exportBtn').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `bullet-journal-respaldo-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
        toast('Respaldo descargado 📤');
    });
    document.getElementById('importBtn').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    data = JSON.parse(ev.target.result);
                    save();
                    toast('Datos restaurados correctamente ✅');
                    location.reload();
                } catch (ex) {
                    alert('El archivo no es válido.');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    });

    // ========== INSTALAR PWA ==========
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'inline-block';
    });
    document.getElementById('installBtn').addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                deferredPrompt = null;
                document.getElementById('installBtn').style.display = 'none';
            });
        }
    });

    // ========== DIARIO ==========
    const selectedDate = document.getElementById('selectedDate');
    let typeSelected = 'task';
    selectedDate.value = new Date().toISOString().split('T')[0];
    document.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            typeSelected = btn.dataset.type;
        });
    });
    document.querySelector('.type-btn[data-type="task"]').classList.add('active');

    document.getElementById('addEntryBtn').addEventListener('click', () => {
        const text = document.getElementById('newEntry').value.trim();
        if (!text) return;
        const date = selectedDate.value;
        const dueDateTime = document.getElementById('dueDateTime').value;
        const setAlarm = document.getElementById('setAlarm').checked;
        
        if (!data.daily[date]) data.daily[date] = [];
        
        const entry = {
            id: Date.now(),
            text,
            type: typeSelected,
            done: false,
            migrated: false,
            date: date,
            dueDateTime: dueDateTime || null,
            alarm: (typeSelected === 'task' || typeSelected === 'priority') && dueDateTime && setAlarm,
            alarmFired: false
        };
        
        data.daily[date].push(entry);
        save();
        document.getElementById('newEntry').value = '';
        document.getElementById('dueDateTime').value = '';
        document.getElementById('setAlarm').checked = true;
        renderDaily();
        toast('Entrada agregada ' + (entry.alarm ? 'con alarma ⏰' : ''));
    });

    selectedDate.addEventListener('change', renderDaily);
    document.getElementById('prevDay').addEventListener('click', () => changeDay(-1));
    document.getElementById('nextDay').addEventListener('click', () => changeDay(1));
    document.getElementById('todayBtn').addEventListener('click', () => {
        selectedDate.value = new Date().toISOString().split('T')[0];
        renderDaily();
    });
    function changeDay(offset) {
        const d = new Date(selectedDate.value + 'T00:00:00');
        d.setDate(d.getDate() + offset);
        selectedDate.value = d.toISOString().split('T')[0];
        renderDaily();
    }

    function isOverdue(dueDateTime, done) {
        if (!dueDateTime || done) return false;
        return new Date(dueDateTime).getTime() < new Date().getTime();
    }

    function isToday(dueDateTime) {
        if (!dueDateTime) return false;
        const due = new Date(dueDateTime);
        const now = new Date();
        return due.toDateString() === now.toDateString();
    }

    function formatDueDate(dueDateTime) {
        if (!dueDateTime) return '';
        const d = new Date(dueDateTime);
        const now = new Date();
        const diff = d.getTime() - now.getTime();
        const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
        
        if (diff < 0) return '⚠️ Vencido ' + d.toLocaleString();
        if (days === 0) return '📅 Hoy ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        if (days === 1) return '📅 Mañana ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        return '📅 ' + d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    function renderDaily() {
        const date = selectedDate.value;
        let entries = data.daily[date] || [];
        
        // Ordenar: no completados primero, luego por fecha de vencimiento más próxima
        entries = entries.sort((a, b) => {
            if (a.done !== b.done) return a.done ? 1 : -1;
            if (a.dueDateTime && b.dueDateTime) return new Date(a.dueDateTime) - new Date(b.dueDateTime);
            if (a.dueDateTime) return -1;
            if (b.dueDateTime) return 1;
            return 0;
        });
        
        const container = document.getElementById('dailyEntries');
        if (!entries.length) {
            container.innerHTML = '<p style="opacity:0.7; text-align:center;">Día sin entradas</p>';
            return;
        }
        container.innerHTML = entries.map(e => {
            let rowClass = '';
            if (!e.done && e.dueDateTime) {
                if (isOverdue(e.dueDateTime, e.done)) rowClass = 'overdue';
                else if (isToday(e.dueDateTime)) rowClass = 'due-today';
            }
            return `
                <div class="entry-row ${rowClass}">
                    <div class="bullet-icon ${e.type} ${e.done ? 'done' : ''}" data-id="${e.id}" data-date="${date}">
                        ${e.done ? '✓' : e.type === 'task' ? '•' : e.type === 'priority' ? '★' : e.type === 'event' ? '○' : '—'}
                    </div>
                    <span class="entry-text ${e.done ? 'done' : ''}">${e.text}</span>
                    ${e.dueDateTime ? `<span class="due-info ${isOverdue(e.dueDateTime, e.done) ? 'overdue' : ''}">${formatDueDate(e.dueDateTime)} ${e.alarm ? '⏰' : ''}</span>` : ''}
                    <button class="migrate-btn" data-id="${e.id}" data-date="${date}" title="Migrar">➡️</button>
                    <button class="delete-btn" data-id="${e.id}" data-date="${date}">🗑️</button>
                </div>
            `;
        }).join('');
        
        // eventos
        container.querySelectorAll('.bullet-icon').forEach(b => {
            b.addEventListener('click', () => {
                const id = Number(b.dataset.id);
                const d = b.dataset.date;
                const ent = data.daily[d].find(e => e.id === id);
                if (ent) {
                    ent.done = !ent.done;
                    if (ent.done) ent.alarm = false; // desactivar alarma al completar
                    save();
                    renderDaily();
                }
            });
        });
        container.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = Number(btn.dataset.id);
                const d = btn.dataset.date;
                data.daily[d] = data.daily[d].filter(e => e.id !== id);
                save();
                renderDaily();
            });
        });
        container.querySelectorAll('.migrate-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = Number(btn.dataset.id);
                const d = btn.dataset.date;
                const ent = data.daily[d].find(e => e.id === id);
                if (ent && !ent.done) {
                    const newDate = prompt('Migrar a fecha (AAAA-MM-DD):', new Date().toISOString().split('T')[0]);
                    if (newDate) {
                        ent.migrated = true;
                        ent.migratedTo = newDate;
                        if (!data.daily[newDate]) data.daily[newDate] = [];
                        data.daily[newDate].push({
                            ...ent,
                            id: Date.now(),
                            done: false,
                            migrated: false,
                            date: newDate,
                            alarmFired: false
                        });
                        save();
                        renderDaily();
                        toast('Tarea migrada ➡️');
                    }
                }
            });
        });
    }

    // ========== MENSUAL ==========
    let calMonth = new Date().getMonth();
    let calYear = new Date().getFullYear();

    function renderCalendar() {
        document.getElementById('monthLabel').textContent =
            new Date(calYear, calMonth).toLocaleDateString('es', { month: 'long', year: 'numeric' });
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const firstDay = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        const today = new Date().toISOString().split('T')[0];
        const weekDays = ['Do','Lu','Ma','Mi','Ju','Vi','Sá'];
        weekDays.forEach(d => grid.innerHTML += `<div style="font-weight:bold;">${d}</div>`);
        for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const hasEntries = data.daily[dateStr] && data.daily[dateStr].length > 0;
            const isToday = dateStr === today;
            grid.innerHTML += `<div class="cal-day${isToday ? ' today' : ''}${hasEntries ? ' has-entries' : ''}" data-date="${dateStr}">${d}</div>`;
        }
        document.querySelectorAll('.cal-day').forEach(day => {
            day.addEventListener('click', () => {
                selectedDate.value = day.dataset.date;
                document.querySelector('nav button[data-view="daily"]').click();
            });
        });
    }
    function renderMonthlyTasks() {
        const container = document.getElementById('monthlyTasks');
        let tasks = [];
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            if (data.daily[dateStr]) {
                data.daily[dateStr].forEach(e => tasks.push({...e, date: dateStr}));
            }
        }
        container.innerHTML = tasks.length ? tasks.map(t => `
            <div class="entry-row ${!t.done && t.dueDateTime && isOverdue(t.dueDateTime, t.done) ? 'overdue' : ''} ${!t.done && t.dueDateTime && isToday(t.dueDateTime) ? 'due-today' : ''}">
                <span>${t.done ? '✓' : t.type === 'task' ? '•' : t.type === 'priority' ? '★' : t.type === 'event' ? '○' : '—'}</span>
                <span class="entry-text ${t.done ? 'done' : ''}">${t.text}</span>
                <small>${t.date}</small>
                ${t.dueDateTime ? `<span class="due-info ${isOverdue(t.dueDateTime, t.done) ? 'overdue' : ''}">${formatDueDate(t.dueDateTime)}</span>` : ''}
            </div>
        `).join('') : '<p style="opacity:0.7;">Sin tareas este mes</p>';
    }
    document.getElementById('prevMonth').addEventListener('click', () => {
        calMonth--; if (calMonth < 0) { calMonth=11; calYear--; }
        renderCalendar(); renderMonthlyTasks();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
        calMonth++; if (calMonth > 11) { calMonth=0; calYear++; }
        renderCalendar(); renderMonthlyTasks();
    });

    // ========== FUTURO ==========
    document.getElementById('addFutureBtn').addEventListener('click', () => {
        const text = document.getElementById('futureText').value.trim();
        const month = document.getElementById('futureMonth').value;
        if (!text || !month) return;
        data.future.push({ id: Date.now(), text, month, done: false });
        save();
        document.getElementById('futureText').value = '';
        renderFuture();
    });
    function renderFuture() {
        const container = document.getElementById('futureEntries');
        container.innerHTML = data.future.length ? data.future.map(f => `
            <div class="entry-row">
                <span>🔮</span>
                <span class="entry-text ${f.done ? 'done' : ''}">${f.text}</span>
                <small>${f.month}</small>
                <button class="delete-btn" data-future="${f.id}">🗑️</button>
            </div>
        `).join('') : '<p style="opacity:0.7;">No hay entradas futuras</p>';
        container.querySelectorAll('.delete-btn').forEach(b => {
            b.addEventListener('click', () => {
                data.future = data.future.filter(f => f.id !== Number(b.dataset.future));
                save(); renderFuture();
            });
        });
    }

    // ========== HÁBITOS ==========
    document.getElementById('addHabitBtn').addEventListener('click', () => {
        const name = document.getElementById('newHabit').value.trim();
        if (!name) return;
        data.habits.push({ id: Date.now(), name, tracker: {} });
        save();
        document.getElementById('newHabit').value = '';
        renderHabits();
    });
    function renderHabits() {
        const container = document.getElementById('habitsList');
        if (!data.habits.length) { container.innerHTML = '<p style="opacity:0.7;">Sin hábitos</p>'; return; }
        const last7 = [];
        for (let i=6; i>=0; i--) {
            const d = new Date(); d.setDate(d.getDate()-i);
            last7.push(d.toISOString().split('T')[0]);
        }
        container.innerHTML = data.habits.map(h => `
            <div class="habit-row">
                <span style="flex:1;">${h.name}</span>
                <div class="habit-days">${last7.map(date => `
                    <div class="habit-day ${h.tracker[date] ? 'checked' : ''}" data-habit="${h.id}" data-date="${date}">${h.tracker[date] ? '✓' : ''}</div>
                `).join('')}</div>
                <button class="delete-btn" data-habit="${h.id}">🗑️</button>
            </div>
        `).join('');
        container.querySelectorAll('.habit-day').forEach(day => {
            day.addEventListener('click', () => {
                const habit = data.habits.find(h => h.id === Number(day.dataset.habit));
                if (habit) {
                    habit.tracker[day.dataset.date] = !habit.tracker[day.dataset.date];
                    save(); renderHabits();
                }
            });
        });
        container.querySelectorAll('.delete-btn').forEach(b => {
            b.addEventListener('click', () => {
                data.habits = data.habits.filter(h => h.id !== Number(b.dataset.habit));
                save(); renderHabits();
            });
        });
    }

    // ========== COLECCIONES ==========
    document.getElementById('addCollectionBtn').addEventListener('click', () => {
        const name = document.getElementById('newCollectionName').value.trim();
        if (!name) return;
        data.collections.push({ id: Date.now(), name, items: [] });
        save();
        document.getElementById('newCollectionName').value = '';
        renderCollections();
    });
    function renderCollections() {
        const container = document.getElementById('collectionsList');
        if (!data.collections.length) { container.innerHTML = '<div class="card"><p style="opacity:0.7;">Sin colecciones</p></div>'; return; }
        container.innerHTML = data.collections.map(c => `
            <div class="card">
                <h3>${c.name} <button class="delete-btn" data-collection="${c.id}">🗑️</button></h3>
                <div style="display:flex; gap:0.5rem;">
                    <input type="text" class="col-item-input" data-collection="${c.id}" placeholder="Nuevo elemento" style="flex:1;">
                    <button class="add-col-item-btn" data-collection="${c.id}">➕</button>
                </div>
                <ul style="margin-top:0.5rem;">${c.items.map(i => `<li>${i}</li>`).join('')}</ul>
            </div>
        `).join('');
        container.querySelectorAll('.add-col-item-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const col = data.collections.find(c => c.id === Number(btn.dataset.collection));
                const input = document.querySelector(`.col-item-input[data-collection="${btn.dataset.collection}"]`);
                if (col && input.value.trim()) {
                    col.items.push(input.value.trim());
                    save(); renderCollections();
                }
            });
        });
        container.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                data.collections = data.collections.filter(c => c.id !== Number(btn.dataset.collection));
                save(); renderCollections();
            });
        });
    }

    // ========== TOAST ==========
    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    // ========== SERVICE WORKER & MANIFEST (inline) ==========
    if ('serviceWorker' in navigator) {
        const swBlob = new Blob([`const C='bujo-alarmas-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])).catch(()=>{}))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)).catch(()=>new Response('')));});self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.openWindow('/'));});`], {type:'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
    }
    const manifest = {
        name:'Bullet Journal con Alarmas', short_name:'Bujo Alarmas', start_url:'.', display:'standalone',
        background_color:'#f5f5f7', theme_color:'#6f42c1',
        icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#6f42c1"/><text x="96" y="120" font-size="96" text-anchor="middle" fill="white">⏰</text></svg>'),sizes:'192x192',type:'image/svg+xml'}]
    };
    const link = document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'})); document.head.appendChild(link);

    // ========== INICIALIZAR ==========
    renderDaily();
    renderCalendar();
    renderMonthlyTasks();
    renderFuture();
    renderHabits();
    renderCollections();
    
    // Configurar alarmas al cargar
    setupAllAlarms();
    
    // Verificar alarmas cada minuto
    setInterval(() => setupAllAlarms(), 60000);
</script>
</body>
</html>
