<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <!-- Viewport optimizado para tablet -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Safari iOS - Modo standalone y estilo */
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bullet Journal">
    
    <!-- iPadOS - Split View y multitarea -->
    <meta name="supported-color-schemes" content="light dark">
    
    <!-- Android/Chrome -->
    <meta name="theme-color" content="#6c5ce7">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#6c5ce7">
    <meta name="msapplication-tap-highlight" content="no">
    
    <title>Bullet Journal</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple Touch Icons (múltiples tamaños para iPad) -->
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
    
    <!-- iPad Splash Screens -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" href="splash/ipad-1536x2048.png">
    <link rel="apple-touch-startup-image" media="screen and (device-width: 810px) and (device-height: 1080px) and (-webkit-device-pixel-ratio: 2)" href="splash/ipad-1620x2160.png">
    <link rel="apple-touch-startup-image" media="screen and (device-width: 834px) and (device-height: 1112px) and (-webkit-device-pixel-ratio: 2)" href="splash/ipad-1668x2224.png">
    <link rel="apple-touch-startup-image" media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" href="splash/ipad-2048x2732.png">
</head>
<body>
    <div class="app-container">
        <!-- Overlay para sidebar en tablet vertical -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>
        
        <!-- Barra superior con comandos táctiles -->
        <header class="header">
            <button id="menuToggle" class="icon-btn tablet-touch" aria-label="Menú">
                <span class="hamburger-icon"></span>
            </button>
            
            <h1 class="app-title">Bullet Journal</h1>
            
            <div class="header-actions">
                <!-- Búsqueda rápida (útil en tablet) -->
                <button id="searchToggle" class="icon-btn tablet-touch" aria-label="Buscar">
                    🔍
                </button>
                
                <!-- Vista rápida calendario -->
                <button id="quickCalendar" class="icon-btn tablet-touch" aria-label="Calendario">
                    📅
                </button>
                
                <!-- Tema oscuro -->
                <button id="themeToggle" class="icon-btn tablet-touch" aria-label="Cambiar tema">
                    🌓
                </button>
            </div>
        </header>

        <!-- Barra de búsqueda (oculta por defecto) -->
        <div id="searchBar" class="search-bar hidden">
            <input type="search" id="searchInput" placeholder="Buscar en tu journal..." autocomplete="off">
            <button id="closeSearch" class="icon-btn">✕</button>
        </div>

        <!-- Sidebar - Siempre visible en tablet horizontal -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>Colecciones</h2>
                <button id="closeSidebar" class="icon-btn tablet-touch mobile-only">✕</button>
            </div>
            
            <!-- Información rápida (visible solo en tablet) -->
            <div class="tablet-info">
                <div class="quick-stats">
                    <span class="stat-item" id="pendingTasks">0 pendientes</span>
                    <span class="stat-item" id="todayEntries">0 hoy</span>
                </div>
            </div>
            
            <ul class="collection-list">
                <li class="collection-item active" data-view="daily">
                    <span class="collection-icon">📅</span>
                    <span class="collection-text">Registro Diario</span>
                    <span class="badge" id="dailyBadge">0</span>
                </li>
                <li class="collection-item" data-view="monthly">
                    <span class="collection-icon">📆</span>
                    <span class="collection-text">Registro Mensual</span>
                </li>
                <li class="collection-item" data-view="future">
                    <span class="collection-icon">🔮</span>
                    <span class="collection-text">Registro Futuro</span>
                </li>
                <li class="collection-item" data-view="collections">
                    <span class="collection-icon">📚</span>
                    <span class="collection-text">Colecciones</span>
                </li>
                <li class="collection-item" data-view="habits">
                    <span class="collection-icon">✅</span>
                    <span class="collection-text">Hábitos</span>
                </li>
                <li class="collection-item" data-view="mood">
                    <span class="collection-icon">🎭</span>
                    <span class="collection-text">Registro de Ánimo</span>
                </li>
            </ul>
            
            <!-- Acciones rápidas -->
            <div class="sidebar-actions">
                <button id="newCollection" class="btn-primary tablet-touch">
                    + Nueva Colección
                </button>
                <button id="exportData" class="btn-secondary tablet-touch">
                    📤 Exportar
                </button>
                <button id="importData" class="btn-secondary tablet-touch">
                    📥 Importar
                </button>
            </div>
        </nav>

        <!-- Contenido principal con área para Split View -->
        <main class="main-content">
            <!-- Panel izquierdo (principal) -->
            <div class="content-panel primary-panel">
                <!-- Registro Diario -->
                <section id="dailyView" class="view active">
                    <div class="view-header">
                        <div class="date-navigation">
                            <button id="prevDay" class="icon-btn tablet-touch">◀</button>
                            <input type="date" id="dailyDate" class="date-picker tablet-touch">
                            <button id="nextDay" class="icon-btn tablet-touch">▶</button>
                            <button id="todayBtn" class="btn-secondary tablet-touch">Hoy</button>
                        </div>
                    </div>
                    
                    <div class="entry-form">
                        <textarea 
                            id="dailyEntry" 
                            placeholder="• Tarea&#10;○ Evento&#10;— Nota&#10;★ Prioridad" 
                            rows="3"
                            class="tablet-input"
                        ></textarea>
                        
                        <div class="entry-type">
                            <button class="type-btn tablet-touch" data-type="task">
                                <span class="bullet">•</span> Tarea
                            </button>
                            <button class="type-btn tablet-touch" data-type="event">
                                <span class="bullet">○</span> Evento
                            </button>
                            <button class="type-btn tablet-touch" data-type="note">
                                <span class="bullet">—</span> Nota
                            </button>
                            <button class="type-btn tablet-touch" data-type="priority">
                                <span class="bullet">★</span> Prioridad
                            </button>
                        </div>
                        
                        <button id="addDailyEntry" class="btn-primary tablet-touch">
                            Agregar entrada
                        </button>
                    </div>

                    <div id="dailyEntries" class="entries-list">
                        <!-- Entradas con soporte para arrastrar -->
                    </div>
                </section>

                <!-- Resto de vistas igual que antes -->
            </div>
            
            <!-- Panel derecho (detalles/vista previa) - Solo tablet horizontal -->
            <div class="content-panel detail-panel" id="detailPanel">
                <div class="detail-placeholder">
                    <p>Selecciona una entrada para ver detalles</p>
                </div>
            </div>
        </main>
        
        <!-- Barra inferior con atajos (tablet y teléfono) -->
        <footer class="footer-bar">
            <button class="footer-btn tablet-touch" data-action="quickTask">
                <span class="footer-icon">✏️</span>
                <span class="footer-label">Rápida</span>
            </button>
            <button class="footer-btn tablet-touch" data-action="voiceNote">
                <span class="footer-icon">🎤</span>
                <span class="footer-label">Voz</span>
            </button>
            <button class="footer-btn tablet-touch" data-action="photo">
                <span class="footer-icon">📷</span>
                <span class="footer-label">Foto</span>
            </button>
            <button class="footer-btn tablet-touch" data-action="drawing">
                <span class="footer-icon">🎨</span>
                <span class="footer-label">Dibujo</span>
            </button>
        </footer>
    </div>

    <!-- Modal para contenido detallado -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal tablet-touch">&times;</span>
            <h3 id="modalTitle">Nueva Colección</h3>
            <form id="modalForm">
                <input type="text" id="modalInput" placeholder="Nombre de la colección" class="tablet-input">
                <textarea id="modalDescription" placeholder="Descripción (opcional)" class="tablet-input"></textarea>
                <button type="submit" class="btn-primary tablet-touch">Guardar</button>
            </form>
        </div>
    </div>

    <!-- Modal para dibujo (usando Canvas + Apple Pencil) -->
    <div id="drawingModal" class="modal">
        <div class="modal-content drawing-content">
            <div class="drawing-toolbar">
                <button class="tablet-touch" data-tool="pen">🖊️</button>
                <button class="tablet-touch" data-tool="eraser">🧹</button>
                <button class="tablet-touch" data-tool="color">🎨</button>
                <input type="color" id="colorPicker" value="#000000">
                <input type="range" id="brushSize" min="1" max="10" value="3">
            </div>
            <canvas id="drawingCanvas"></canvas>
            <div class="drawing-actions">
                <button id="clearCanvas" class="btn-secondary tablet-touch">Limpiar</button>
                <button id="saveDrawing" class="btn-primary tablet-touch">Guardar dibujo</button>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/journal.js"></script>
    <script src="js/tablet-features.js"></script>
    <script src="js/drawing.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
