<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullet Journal con Google Calendar Automático</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --accent: #6f42c1;
            --accent-light: #e9d5ff;
            --border: #e5e5ea;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
            --overdue: #ffe0e0;
            --today: #fff3cd;
        }
        body.dark {
            --bg: #1c1c1e;
            --card: #2c2c2e;
            --text: #f5f5f7;
            --border: #48484a;
            --overdue: #4a1c1c;
            --today: #4a3d1c;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 1rem;
            max-width: 900px;
            margin: 0 auto;
            transition: background 0.3s, color 0.3s;
            padding-bottom: 80px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        h1 { font-size: 1.5rem; }
        button, .btn, select {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: inherit;
        }
        button:hover, .btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .btn.active { background: var(--accent); color: white; }
        .btn-google { background: #4285f4; color: white; border: none; font-weight: bold; }
        .btn-google:hover { background: #357ae8; }
        .btn-google.connected { background: var(--success); }
        nav { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .view { display: none; animation: fadeIn 0.2s; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card {
            background: var(--card);
            padding: 1.2rem;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
        }
        textarea, input[type="text"], input[type="date"], input[type="search"], input[type="datetime-local"], input[type="time"], input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--bg);
            color: var(--text);
            margin-bottom: 0.5rem;
            font-family: inherit;
            resize: vertical;
        }
        .entry-row {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.6rem;
            border-bottom: 1px solid var(--border);
            transition: 0.2s;
            border-radius: 8px;
            margin-bottom: 0.2rem;
        }
        .entry-row:last-child { border-bottom: none; }
        .entry-row:hover { background: var(--bg); }
        .entry-row.overdue { background: var(--overdue); }
        .entry-row.due-today { background: var(--today); }
        .entry-row.paid { opacity: 0.6; }
        .entry-text { flex: 1; word-break: break-word; }
        .entry-text.done { text-decoration: line-through; opacity: 0.5; }
        .bullet-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; font-weight: bold;
            border: 2px solid var(--accent); color: var(--accent);
        }
        .bullet-icon.done { background: var(--success); color: white; border-color: var(--success); }
        .delete-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; padding: 0 0.3rem; }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: var(--bg); padding: 0.75rem 1.5rem;
            border-radius: 20px; z-index: 999; animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
        .inline-form { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
        .inline-form label { font-size: 0.85rem; }
        .modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.open { display: flex; }
        .modal-content { background: var(--card); padding: 2rem; border-radius: 16px; max-width: 500px; width: 90%; }
        .payment-summary { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .payment-summary .summary-item { flex: 1; text-align: center; padding: 0.5rem; border-radius: 8px; font-size: 0.85rem; }
        .payment-summary .summary-item.paid-summary { background: #d4edda; }
        .payment-summary .summary-item.pending-summary { background: #fff3cd; }
        .payment-summary .summary-item.overdue-summary { background: #ffe0e0; }
        .dark .payment-summary .summary-item.paid-summary { background: #1a3d2a; }
        .dark .payment-summary .summary-item.pending-summary { background: #4a3d1c; }
        .dark .payment-summary .summary-item.overdue-summary { background: #4a1c1c; }
        .payment-status { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 12px; white-space: nowrap; }
        .payment-status.paid-status { background: var(--success); color: white; }
        .payment-status.pending-status { background: var(--warning); color: #000; }
        .payment-status.overdue-status { background: var(--danger); color: white; }
        .habit-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
        .habit-days { display: flex; gap: 4px; }
        .habit-day {
            width: 24px; height: 24px; border: 1px solid var(--border); border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
            cursor: pointer; background: var(--card);
        }
        .habit-day.checked { background: var(--accent); color: white; }
        .footer { text-align: center; margin-top: 2rem; font-size: 0.8rem; opacity: 0.7; }
        .install-btn { background: var(--accent); color: white; border: none; display: none; }
        @media (max-width: 500px) {
            nav button { font-size: 0.8rem; padding: 0.4rem 0.7rem; }
            .entry-row { flex-wrap: wrap; }
            .payment-summary { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <h1>📓 Bullet Journal</h1>
    <div>
        <button id="googleBtn" class="btn-google">🔗 Conectar Google Calendar</button>
        <button id="cloudUpBtn" title="Subir a la nube">☁️↑</button>
        <button id="cloudDownBtn" title="Descargar de la nube">☁️↓</button>
        <button id="exportBtn" title="Respaldo archivo">📤</button>
        <button id="importBtn" title="Restaurar archivo">📥</button>
        <button id="settingsBtn" title="Configurar nube">⚙️</button>
        <button id="themeToggle">🌓</button>
        <button id="installBtn" class="install-btn">📲 Instalar</button>
    </div>
</header>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>Configurar copia en la nube</h3>
        <p><small>Usa JSONBin.io (gratis). <a href="https://jsonbin.io" target="_blank">Crear cuenta</a></small></p>
        <label>API Key:</label>
        <input type="text" id="apiKeyInput" placeholder="Pega aquí tu API Key">
        <label>Bin ID:</label>
        <input type="text" id="binIdInput" placeholder="Pega aquí el Bin ID">
        <div style="margin-top:1rem; display:flex; gap:0.5rem;">
            <button id="saveSettingsBtn" class="btn">Guardar configuración</button>
            <button id="closeSettingsBtn" class="btn">Cancelar</button>
        </div>
        <p id="cloudStatus" style="margin-top:0.5rem; font-size:0.8rem;"></p>
    </div>
</div>

<nav>
    <button class="btn active" data-view="daily">📅 Diario</button>
    <button class="btn" data-view="payments">💳 Pagos</button>
    <button class="btn" data-view="habits">✅ Hábitos</button>
    <button class="btn" data-view="collections">📚 Colecciones</button>
    <button class="btn" data-view="future">🔮 Futuro</button>
</nav>

<div id="dailyView" class="view active">
    <div class="card">
        <div style="display:flex; gap:0.5rem; align-items:center;">
            <input type="date" id="selectedDate" style="flex:1;">
            <button id="prevDay">◀</button>
            <button id="todayBtn">Hoy</button>
            <button id="nextDay">▶</button>
        </div>
        <textarea id="newEntry" placeholder="Escribe aquí tu tarea, evento, nota..." rows="2"></textarea>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.5rem;">
            <button class="btn type-btn" data-type="task">• Tarea</button>
            <button class="btn type-btn" data-type="priority">★ Prioridad</button>
            <button class="btn type-btn" data-type="event">○ Evento</button>
            <button class="btn type-btn" data-type="note">— Nota</button>
        </div>
        <div class="inline-form">
            <label>📅 Vence:</label>
            <input type="datetime-local" id="dueDateTime" style="width: auto; flex: 1;">
            <label>⏰ Alarma:</label>
            <input type="checkbox" id="setAlarm" checked>
        </div>
        <div class="inline-form">
            <label>📅 Google Calendar:</label>
            <input type="checkbox" id="addToGoogle" checked>
        </div>
        <button id="addEntryBtn" style="width:100%; margin-top:0.5rem;">➕ Agregar entrada</button>
    </div>
    <div id="dailyEntries" class="card"></div>
</div>

<div id="paymentsView" class="view">
    <div class="card">
        <h3>💳 Agregar pago</h3>
        <input type="text" id="paymentName" placeholder="Nombre del pago">
        <div style="display:flex; gap:0.5rem;">
            <input type="number" id="paymentAmount" placeholder="Monto" step="0.01" style="flex:1;">
            <input type="date" id="paymentDueDate" style="flex:1;">
        </div>
        <div class="inline-form">
            <label>🔄 Repetir:</label>
            <select id="paymentRepeat">
                <option value="none">Pago único</option>
                <option value="monthly">Mensual</option>
            </select>
            <label>⏰ Alarma:</label>
            <input type="checkbox" id="paymentAlarm" checked>
            <label>📅 Google:</label>
            <input type="checkbox" id="paymentGoogle" checked>
        </div>
        <button id="addPaymentBtn" style="width:100%;">➕ Agregar pago</button>
    </div>
    <div class="card">
        <div style="display:flex; gap:0.5rem; align-items:center; margin-bottom:1rem;">
            <button id="prevPaymentMonth">◀</button>
            <span id="paymentMonthLabel" style="flex:1; text-align:center; font-weight:bold;"></span>
            <button id="nextPaymentMonth">▶</button>
        </div>
        <div class="payment-summary" id="paymentSummary"></div>
        <div id="paymentsList"></div>
    </div>
</div>

<div id="habitsView" class="view">
    <div class="card">
        <input type="text" id="newHabit" placeholder="Nuevo hábito">
        <button id="addHabitBtn">➕ Agregar hábito</button>
    </div>
    <div id="habitsList" class="card"></div>
</div>

<div id="collectionsView" class="view">
    <div class="card">
        <input type="text" id="newCollectionName" placeholder="Nombre de la colección">
        <button id="addCollectionBtn">➕ Crear colección</button>
    </div>
    <div id="collectionsList"></div>
</div>

<div id="futureView" class="view">
    <div class="card">
        <input type="text" id="futureText" placeholder="Ej: En marzo: renovar pasaporte">
        <input type="month" id="futureMonth">
        <button id="addFutureBtn">➕ Agregar</button>
    </div>
    <div id="futureEntries" class="card"></div>
</div>

<div class="footer">Conecta Google Calendar para crear eventos automáticamente</div>

<script>
// ========== CONFIGURACIÓN GOOGLE ==========
document.addEventListener('DOMContentLoaded', async () => {
    console.info('Inicializando Bullet Journal');
const GOOGLE_CLIENT_ID = '268889831095-3j0b88nuh74sr7a011mli2g930ltvvbc.apps.googleusercontent.com'; // ← REEMPLAZA ESTO
const STORAGE = 'bujo_google_auto';
let googleToken = null;
let googleTokenExpiry = 0;
let googleConnected = false;
const GOOGLE_SCOPE = 'https://www.googleapis.com/auth/calendar.events';

// ========== DATOS ==========
let data = { daily: {}, habits: [], collections: [], future: [], payments: [] };

async function load() {
    const raw = localStorage.getItem(STORAGE);
    if (raw) {
        try {
            data = JSON.parse(raw);
        } catch (e) {
            console.error('Error parsing stored data, resetting.', e);
            data = { daily: {}, habits: [], collections: [], future: [], payments: [] };
        }
    }
    if (!data.payments) data.payments = [];
    googleToken = localStorage.getItem('google_token');
    googleTokenExpiry = parseInt(localStorage.getItem('google_token_expiry'), 10) || 0;
    if (googleToken && isGoogleTokenExpired()) {
        googleToken = null;
        googleTokenExpiry = 0;
        localStorage.removeItem('google_token');
        localStorage.removeItem('google_token_expiry');
    }
    googleConnected = !!googleToken;
    updateGoogleButton();
    await handleGoogleRedirect();
}
function save() { localStorage.setItem(STORAGE, JSON.stringify(data)); }
await load();

function updateGoogleButton() {
    const btn = document.getElementById('googleBtn');
    if (googleConnected) {
        btn.textContent = '✅ Google Calendar Conectado';
        btn.classList.add('connected');
    } else {
        btn.textContent = '🔗 Conectar Google Calendar';
        btn.classList.remove('connected');
    }
}

function isGoogleTokenExpired() {
    return googleTokenExpiry && Date.now() >= googleTokenExpiry - 60000;
}

function base64UrlEncode(arrayBuffer) {
    const bytes = new Uint8Array(arrayBuffer);
    let str = '';
    for (const byte of bytes) {
        str += String.fromCharCode(byte);
    }
    return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function generateCodeVerifier() {
    const array = new Uint8Array(128);
    window.crypto.getRandomValues(array);
    return base64UrlEncode(array);
}

async function generateCodeChallenge(verifier) {
    const encoder = new TextEncoder();
    const data = encoder.encode(verifier);
    const digest = await window.crypto.subtle.digest('SHA-256', data);
    return base64UrlEncode(digest);
}

function getCurrentPageUrl() {
    return window.location.href.split('?')[0].split('#')[0];
}

async function startGoogleAuth() {
    if (window.location.protocol === 'file:') {
        toast('Usa http(s) y registra el origen en Google Cloud.');
        return;
    }
    const codeVerifier = generateCodeVerifier();
    const codeChallenge = await generateCodeChallenge(codeVerifier);
    localStorage.setItem('google_code_verifier', codeVerifier);

    const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
        'client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID) +
        '&redirect_uri=' + encodeURIComponent(getCurrentPageUrl()) +
        '&response_type=code' +
        '&scope=' + encodeURIComponent(GOOGLE_SCOPE) +
        '&access_type=offline' +
        '&prompt=consent' +
        '&code_challenge=' + encodeURIComponent(codeChallenge) +
        '&code_challenge_method=S256';

    window.location.href = authUrl;
}

async function exchangeCodeForToken(code) {
    const codeVerifier = localStorage.getItem('google_code_verifier');
    if (!codeVerifier) {
        console.error('No se encontró code_verifier para PKCE.');
        return null;
    }

    const body = new URLSearchParams();
    body.set('client_id', GOOGLE_CLIENT_ID);
    body.set('code', code);
    body.set('code_verifier', codeVerifier);
    body.set('grant_type', 'authorization_code');
    body.set('redirect_uri', getCurrentPageUrl());

    try {
        const response = await fetch('https://oauth2.googleapis.com/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: body.toString()
        });
        if (!response.ok) {
            const error = await response.json().catch(() => ({}));
            console.error('Token exchange failed', response.status, error);
            return null;
        }
        return await response.json();
    } catch (e) {
        console.error('Error en exchangeCodeForToken:', e);
        return null;
    }
}

async function handleGoogleRedirect() {
    const params = new URLSearchParams(window.location.search);
    if (params.has('code')) {
        const code = params.get('code');
        const tokenData = await exchangeCodeForToken(code);
        if (tokenData && tokenData.access_token) {
            googleToken = tokenData.access_token;
            googleTokenExpiry = Date.now() + (tokenData.expires_in || 0) * 1000;
            googleConnected = true;
            localStorage.setItem('google_token', googleToken);
            localStorage.setItem('google_token_expiry', String(googleTokenExpiry));
            toast('✅ Google Calendar conectado');
        } else {
            toast('Error al conectar Google Calendar');
        }
        window.history.replaceState({}, document.title, getCurrentPageUrl());
        updateGoogleButton();
    } else if (params.has('error')) {
        console.error('Google auth error', params.get('error'));
        toast('Acceso de Google rechazado');
        window.history.replaceState({}, document.title, getCurrentPageUrl());
    }
}

async function ensureGoogleAccess() {
    if (!googleConnected) return false;
    if (isGoogleTokenExpired()) {
        googleToken = null;
        googleTokenExpiry = 0;
        googleConnected = false;
        localStorage.removeItem('google_token');
        localStorage.removeItem('google_token_expiry');
        updateGoogleButton();
        toast('Token de Google expirado. Reconecta.');
        return false;
    }
    return true;
}

document.getElementById('googleBtn').addEventListener('click', async () => {
    if (googleConnected) {
        if (confirm('¿Desconectar Google Calendar?')) {
            googleToken = null;
            googleTokenExpiry = 0;
            googleConnected = false;
            localStorage.removeItem('google_token');
            localStorage.removeItem('google_token_expiry');
            localStorage.removeItem('google_code_verifier');
            updateGoogleButton();
            toast('Google Calendar desconectado');
        }
        return;
    }
    await startGoogleAuth();
});

async function addToGoogleCalendar(title, dateTime) {
    if (!await ensureGoogleAccess()) return null;
    try {
        const startDate = new Date(dateTime);
        const endDate = new Date(startDate.getTime() + 3600000);
        const event = {
            summary: title,
            start: {
                dateTime: startDate.toISOString(),
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
            },
            end: {
                dateTime: endDate.toISOString(),
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone
            },
            reminders: {
                useDefault: false,
                overrides: [{ method: 'popup', minutes: 30 }]
            }
        };
        const response = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + googleToken,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(event)
        });
        if (response.ok) {
            const result = await response.json();
            return result.id;
        } else if (response.status === 401) {
            googleToken = null;
            googleTokenExpiry = 0;
            googleConnected = false;
            localStorage.removeItem('google_token');
            localStorage.removeItem('google_token_expiry');
            updateGoogleButton();
            toast('⚠️ Sesión de Google expirada. Reconecta.');
        }
    } catch (e) {
        console.error('Error:', e);
    }
    return null;
}

async function deleteFromGoogleCalendar(eventId) {
    if (!await ensureGoogleAccess() || !eventId) return;
    try {
        await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events/' + encodeURIComponent(eventId), {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + googleToken }
        });
    } catch (e) {}
}

// Validación cliente Google
try {
    if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.includes('REEMPLAZA')) {
        console.warn('GOOGLE_CLIENT_ID no configurado. Botón Google deshabilitado.');
        const gb = document.getElementById('googleBtn');
        if (gb) { gb.disabled = true; gb.title = 'Configura GOOGLE_CLIENT_ID en el código'; }
    }
} catch (e) { console.error(e); }

// ========== NUBE ==========
function getCloudConfig() {
    return {
        apiKey: localStorage.getItem('cloud_apiKey') || '',
        binId: localStorage.getItem('cloud_binId') || ''
    };
}
function saveCloudConfig(apiKey, binId) {
    localStorage.setItem('cloud_apiKey', apiKey);
    localStorage.setItem('cloud_binId', binId);
}

async function uploadToCloud() {
    const { apiKey, binId } = getCloudConfig();
    if (!apiKey || !binId) { alert('Configura primero tu nube (⚙️).'); return; }
    try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
            method: 'PUT',
            headers: { 'X-Master-Key': apiKey, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (r.ok) { toast('Datos subidos ☁️'); } else throw new Error();
    } catch (e) { alert('Error al subir.'); }
}

async function downloadFromCloud() {
    const { apiKey, binId } = getCloudConfig();
    if (!apiKey || !binId) { alert('Configura primero tu nube (⚙️).'); return; }
    if (!confirm('¿Reemplazar datos locales?')) return;
    try {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}`, { headers: { 'X-Master-Key': apiKey } });
        if (r.ok) { data = (await r.json()).record; save(); toast('Datos descargados ☁️'); location.reload(); }
    } catch (e) { alert('Error al descargar.'); }
}

document.getElementById('settingsBtn').addEventListener('click', () => {
    const cfg = getCloudConfig();
    document.getElementById('apiKeyInput').value = cfg.apiKey;
    document.getElementById('binIdInput').value = cfg.binId;
    document.getElementById('settingsModal').classList.add('open');
});
document.getElementById('closeSettingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('open'));
document.getElementById('saveSettingsBtn').addEventListener('click', () => {
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    const binId = document.getElementById('binIdInput').value.trim();
    if (!apiKey || !binId) { alert('Ambos campos son necesarios.'); return; }
    saveCloudConfig(apiKey, binId);
    document.getElementById('settingsModal').classList.remove('open');
    toast('Configuración guardada ⚙️');
});
document.getElementById('cloudUpBtn').addEventListener('click', uploadToCloud);
document.getElementById('cloudDownBtn').addEventListener('click', downloadFromCloud);

// ========== TEMA ==========
document.getElementById('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('bujo_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
});
if (localStorage.getItem('bujo_theme') === 'dark') document.body.classList.add('dark');

// ========== EXPORTAR / IMPORTAR ==========
document.getElementById('exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `bullet-journal-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    toast('Respaldo descargado 📤');
});
document.getElementById('importBtn').addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try { data = JSON.parse(ev.target.result); save(); toast('Datos restaurados ✅'); location.reload(); }
            catch (ex) { alert('Archivo no válido.'); }
        };
        reader.readAsText(e.target.files[0]);
    };
    input.click();
});

// ========== INSTALAR PWA ==========
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBtn').style.display = 'inline-block';
});
document.getElementById('installBtn').addEventListener('click', () => {
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
});

// ========== NAVEGACIÓN ==========
document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(btn.dataset.view + 'View').classList.add('active');
        if (btn.dataset.view === 'daily') renderDaily();
        if (btn.dataset.view === 'payments') renderPayments();
        if (btn.dataset.view === 'habits') renderHabits();
        if (btn.dataset.view === 'collections') renderCollections();
        if (btn.dataset.view === 'future') renderFuture();
    });
});

// ========== DIARIO ==========
const selectedDate = document.getElementById('selectedDate');
selectedDate.value = new Date().toISOString().split('T')[0];
let typeSelected = 'task';

document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        typeSelected = btn.dataset.type;
    });
});
document.querySelector('.type-btn[data-type="task"]').classList.add('active');

document.getElementById('addEntryBtn').addEventListener('click', async () => {
    const text = document.getElementById('newEntry').value.trim();
    if (!text) return;
    const date = selectedDate.value;
    const due = document.getElementById('dueDateTime').value;
    const alarm = document.getElementById('setAlarm').checked;
    const addToGoogle = document.getElementById('addToGoogle').checked;
    
    if (!data.daily[date]) data.daily[date] = [];
    
    let googleEventId = null;
    if (addToGoogle && due && googleConnected) {
        googleEventId = await addToGoogleCalendar(text, due);
        if (googleEventId) toast('📅 Evento creado en Google Calendar automáticamente');
    }
    
    data.daily[date].push({
        id: Date.now(),
        text,
        type: typeSelected,
        done: false,
        date,
        dueDateTime: due || null,
        alarm: alarm && !!due,
        googleEventId
    });
    save();
    document.getElementById('newEntry').value = '';
    document.getElementById('dueDateTime').value = '';
    renderDaily();
    toast('Entrada agregada');
});

selectedDate.addEventListener('change', renderDaily);
document.getElementById('prevDay').addEventListener('click', () => changeDay(-1));
document.getElementById('nextDay').addEventListener('click', () => changeDay(1));
document.getElementById('todayBtn').addEventListener('click', () => { selectedDate.value = new Date().toISOString().split('T')[0]; renderDaily(); });
function changeDay(o) { const d = new Date(selectedDate.value + 'T00:00:00'); d.setDate(d.getDate() + o); selectedDate.value = d.toISOString().split('T')[0]; renderDaily(); }

function renderDaily() {
    const date = selectedDate.value;
    const entries = (data.daily[date] || []).sort((a, b) => a.done - b.done);
    const container = document.getElementById('dailyEntries');
    if (!entries.length) { container.innerHTML = '<p style="opacity:0.7;text-align:center;">Día sin entradas</p>'; return; }
    container.innerHTML = entries.map(e => {
        let cls = '';
        if (!e.done && e.dueDateTime && new Date(e.dueDateTime) < new Date()) cls = 'overdue';
        else if (!e.done && e.dueDateTime && new Date(e.dueDateTime).toDateString() === new Date().toDateString()) cls = 'due-today';
        return `<div class="entry-row ${cls}">
            <div class="bullet-icon ${e.done ? 'done' : ''}" data-id="${e.id}">${e.done ? '✓' : '•'}</div>
            <span class="entry-text ${e.done ? 'done' : ''}">${e.text}</span>
            ${e.googleEventId ? '<span style="color:#4285f4;font-size:0.8rem;">📅 Auto</span>' : ''}
            <button class="delete-btn" data-id="${e.id}">🗑️</button>
        </div>`;
    }).join('');
    
    container.querySelectorAll('.bullet-icon').forEach(b => {
        b.addEventListener('click', async () => {
            const ent = data.daily[date].find(e => e.id === Number(b.dataset.id));
            if (ent) {
                ent.done = !ent.done;
                if (ent.done && ent.googleEventId) {
                    await deleteFromGoogleCalendar(ent.googleEventId);
                    ent.googleEventId = null;
                }
                save();
                renderDaily();
            }
        });
    });
    
    container.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const ent = data.daily[date].find(e => e.id === Number(btn.dataset.id));
            if (ent && ent.googleEventId) await deleteFromGoogleCalendar(ent.googleEventId);
            data.daily[date] = data.daily[date].filter(e => e.id !== Number(btn.dataset.id));
            save();
            renderDaily();
        });
    });
}

// ========== PAGOS ==========
let payMonth = new Date().getMonth(), payYear = new Date().getFullYear();

document.getElementById('addPaymentBtn').addEventListener('click', async () => {
    const name = document.getElementById('paymentName').value.trim();
    const amount = parseFloat(document.getElementById('paymentAmount').value) || 0;
    const dueDate = document.getElementById('paymentDueDate').value;
    const recurring = document.getElementById('paymentRepeat').value;
    const alarm = document.getElementById('paymentAlarm').checked;
    const addToGoogle = document.getElementById('paymentGoogle').checked;
    if (!name || !dueDate) return;
    
    let googleEventId = null;
    if (addToGoogle && googleConnected) {
        googleEventId = await addToGoogleCalendar('💳 ' + name + ' - $' + amount, dueDate + 'T09:00:00');
        if (googleEventId) toast('📅 Pago agregado a Google Calendar automáticamente');
    }
    
    data.payments.push({ id: Date.now(), name, amount, dueDate, paid: false, recurring, alarm, googleEventId });
    save();
    document.getElementById('paymentName').value = '';
    document.getElementById('paymentAmount').value = '';
    renderPayments();
    toast('Pago agregado 💳');
});

function renderPayments() {
    document.getElementById('paymentMonthLabel').textContent = new Date(payYear, payMonth).toLocaleDateString('es', { month: 'long', year: 'numeric' });
    const start = `${payYear}-${String(payMonth+1).padStart(2,'0')}-01`;
    const end = `${payYear}-${String(payMonth+1).padStart(2,'0')}-${new Date(payYear, payMonth+1, 0).getDate()}`;
    const payments = data.payments.filter(p => p.dueDate >= start && p.dueDate <= end);
    const today = new Date().toISOString().split('T')[0];
    
    let paid = 0, pending = 0, overdue = 0;
    payments.forEach(p => {
        if (p.paid) paid += p.amount;
        else if (p.dueDate < today) overdue += p.amount;
        else pending += p.amount;
    });
    
    document.getElementById('paymentSummary').innerHTML = `
        <div class="summary-item paid-summary">✅ Pagado<br>$${paid.toFixed(2)}</div>
        <div class="summary-item pending-summary">⏳ Pendiente<br>$${pending.toFixed(2)}</div>
        <div class="summary-item overdue-summary">⚠️ Vencido<br>$${overdue.toFixed(2)}</div>
    `;
    
    const container = document.getElementById('paymentsList');
    if (!payments.length) { container.innerHTML = '<p style="opacity:0.7;text-align:center;">Sin pagos</p>'; return; }
    container.innerHTML = payments.sort((a, b) => a.paid - b.paid || a.dueDate.localeCompare(b.dueDate)).map(p => {
        let cls = p.paid ? 'paid' : p.dueDate < today ? 'overdue' : p.dueDate === today ? 'due-today' : '';
        let status = p.paid ? 'Pagado' : p.dueDate < today ? 'Vencido' : 'Pendiente';
        let sc = p.paid ? 'paid-status' : p.dueDate < today ? 'overdue-status' : 'pending-status';
        return `<div class="entry-row ${cls}">
            <div class="bullet-icon ${p.paid ? 'done' : ''}" data-id="${p.id}">${p.paid ? '✓' : '💳'}</div>
            <span class="entry-text ${p.paid ? 'done' : ''}">${p.name}</span>
            <span>$${p.amount.toFixed(2)}</span>
            <span class="payment-status ${sc}">${status}</span>
            <small>${p.dueDate}</small>
            ${p.googleEventId ? '<span style="color:#4285f4;font-size:0.8rem;">📅 Auto</span>' : ''}
            <button class="delete-btn" data-id="${p.id}">🗑️</button>
        </div>`;
    }).join('');
    
    container.querySelectorAll('.bullet-icon').forEach(b => {
        b.addEventListener('click', async () => {
            const p = data.payments.find(x => x.id === Number(b.dataset.id));
            if (p) {
                p.paid = !p.paid;
                if (p.paid && p.googleEventId) {
                    await deleteFromGoogleCalendar(p.googleEventId);
                    p.googleEventId = null;
                }
                save();
                renderPayments();
            }
        });
    });
    container.querySelectorAll('.delete-btn').forEach(b => {
        b.addEventListener('click', async () => {
            const p = data.payments.find(x => x.id === Number(b.dataset.id));
            if (p && p.googleEventId) await deleteFromGoogleCalendar(p.googleEventId);
            data.payments = data.payments.filter(x => x.id !== Number(b.dataset.id));
            save();
            renderPayments();
        });
    });
}
document.getElementById('prevPaymentMonth').addEventListener('click', () => { payMonth--; if (payMonth < 0) { payMonth = 11; payYear--; } renderPayments(); });
document.getElementById('nextPaymentMonth').addEventListener('click', () => { payMonth++; if (payMonth > 11) { payMonth = 0; payYear++; } renderPayments(); });

// ========== HÁBITOS ==========
document.getElementById('addHabitBtn').addEventListener('click', () => {
    const name = document.getElementById('newHabit').value.trim();
    if (!name) return;
    data.habits.push({ id: Date.now(), name, tracker: {} });
    save(); document.getElementById('newHabit').value = ''; renderHabits();
});
function renderHabits() {
    const c = document.getElementById('habitsList');
    if (!data.habits.length) { c.innerHTML = '<p style="opacity:0.7;">Sin hábitos</p>'; return; }
    const last7 = []; for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); last7.push(d.toISOString().split('T')[0]); }
    c.innerHTML = data.habits.map(h => `<div class="habit-row"><span style="flex:1;">${h.name}</span><div class="habit-days">${last7.map(date => `<div class="habit-day ${h.tracker[date] ? 'checked' : ''}" data-habit="${h.id}" data-date="${date}">${h.tracker[date] ? '✓' : ''}</div>`).join('')}</div><button class="delete-btn" data-habit="${h.id}">🗑️</button></div>`).join('');
    c.querySelectorAll('.habit-day').forEach(day => { day.addEventListener('click', () => { const h = data.habits.find(x => x.id === Number(day.dataset.habit)); if (h) { h.tracker[day.dataset.date] = !h.tracker[day.dataset.date]; save(); renderHabits(); } }); });
    c.querySelectorAll('.delete-btn').forEach(b => { b.addEventListener('click', () => { data.habits = data.habits.filter(h => h.id !== Number(b.dataset.habit)); save(); renderHabits(); }); });
}

// ========== COLECCIONES ==========
document.getElementById('addCollectionBtn').addEventListener('click', () => {
    const name = document.getElementById('newCollectionName').value.trim();
    if (!name) return;
    data.collections.push({ id: Date.now(), name, items: [] });
    save(); document.getElementById('newCollectionName').value = ''; renderCollections();
});
function renderCollections() {
    const c = document.getElementById('collectionsList');
    if (!data.collections.length) { c.innerHTML = '<div class="card"><p style="opacity:0.7;">Sin colecciones</p></div>'; return; }
    c.innerHTML = data.collections.map(col => `<div class="card"><h3>${col.name} <button class="delete-btn" data-id="${col.id}">🗑️</button></h3><div style="display:flex;gap:0.5rem;"><input type="text" class="ci" data-id="${col.id}" placeholder="Nuevo elemento" style="flex:1;"><button class="aci" data-id="${col.id}">➕</button></div><ul style="margin-top:0.5rem;">${col.items.map(i => `<li>${i}</li>`).join('')}</ul></div>`).join('');
    c.querySelectorAll('.aci').forEach(b => { b.addEventListener('click', () => { const col = data.collections.find(x => x.id === Number(b.dataset.id)); const input = document.querySelector(`.ci[data-id="${b.dataset.id}"]`); if (col && input.value.trim()) { col.items.push(input.value.trim()); save(); renderCollections(); } }); });
    c.querySelectorAll('.delete-btn').forEach(b => { b.addEventListener('click', () => { data.collections = data.collections.filter(x => x.id !== Number(b.dataset.id)); save(); renderCollections(); }); });
}

// ========== FUTURO ==========
document.getElementById('addFutureBtn').addEventListener('click', () => {
    const text = document.getElementById('futureText').value.trim();
    const month = document.getElementById('futureMonth').value;
    if (!text || !month) return;
    data.future.push({ id: Date.now(), text, month, done: false });
    save(); document.getElementById('futureText').value = ''; renderFuture();
});
function renderFuture() {
    const c = document.getElementById('futureEntries');
    c.innerHTML = data.future.length ? data.future.map(f => `<div class="entry-row"><span>🔮</span><span class="entry-text">${f.text}</span><small>${f.month}</small><button class="delete-btn" data-id="${f.id}">🗑️</button></div>`).join('') : '<p style="opacity:0.7;">Sin entradas</p>';
    c.querySelectorAll('.delete-btn').forEach(b => { b.addEventListener('click', () => { data.future = data.future.filter(f => f.id !== Number(b.dataset.id)); save(); renderFuture(); }); });
}

function toast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}

// ========== SERVICE WORKER & MANIFEST ==========
if ('serviceWorker' in navigator) {
    const assets = [location.pathname, '/', '/index.html'];
    const swCode = `const C='bujo-v6';const ASSETS=${JSON.stringify(assets)};self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(ASSETS)).catch(()=>{}))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)).catch(()=>new Response('')));});`;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).then(() => console.info('Service worker registrado')).catch(err => console.warn('Registro SW falló', err));
}
const manifest = {
    name:'Bullet Journal', short_name:'Bujo', start_url:'.', display:'standalone',
    background_color:'#f5f5f7', theme_color:'#6f42c1',
    icons:[{src:'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#6f42c1"/><text x="96" y="120" font-size="96" text-anchor="middle" fill="white">📅</text></svg>'),sizes:'192x192',type:'image/svg+xml'}]
};
const link = document.createElement('link'); link.rel='manifest'; link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'})); document.head.appendChild(link);

// ========== INICIALIZAR ==========
    // Inicialización final
    load();
    renderDaily(); renderPayments(); renderHabits(); renderCollections(); renderFuture();
});
</script>
</body>
</html>
